# Example runtime configuration. Do not put private station settings here.

gpib:
  board: 0
  address: 17
  timeout_ms: 600000
  visa_backend: ""

session:
  audit_log_path: logs/b1500_audit.log
  auto_discover_modules: true
  default_data_format: 1

modules:
  # Replace with the real module inventory after `UNT?` validation.
  # Mirrors the real station: 2x MPSMU, 2x HRSMU, 1x WGFMU, 1x HV-SPGU, 1x MFCMU.
  - slot: 1
    type: MPSMU
    model: B1511B
    alias: gate_smu
  - slot: 2
    type: MPSMU
    model: B1511B
    alias: drain_smu
  - slot: 3
    type: HRSMU
    model: B1517A
    alias: source_smu
  - slot: 4
    type: HRSMU
    model: B1517A
    alias: leakage_smu
  - slot: 5
    type: WGFMU
    model: B1530A
    alias: pulse_wgfmu
  - slot: 6
    type: HVSPGU
    model: B1525A
    alias: pulse_spgu
  - slot: 7
    type: MFCMU
    model: B1520A
    alias: cap_cmu

station_profile:
  path: references/station/station-profile.example.yaml

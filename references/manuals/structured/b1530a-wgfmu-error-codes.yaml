schema_version: 1
source:
  manual_title: "Agilent B1530A Waveform Generator/Fast Measurement Unit User's Guide"
  source_pdf: "B1530A WGFMU.pdf"
  revised_index: "test_agent/references/manuals/b1530a-wgfmu-index.md"
  extraction_date: "2026-06-22"
notes:
  - "Codes 0 to -9999 are reserved by the B1530A WGFMU Instrument Library."
  - "Status codes 10000-10006 are included because they gate measurement data readout, although they are not errors."
  - "Warning levels 1000-1003 are included because warning handling is part of the error/warning API."
  - "Firmware error messages 3324-3327 reveal undocumented internal commands WGMA?, WGMB?, and WGMS?."
  - "Codes 3324-3327 appear on PDF page 161 under a 'Self-test/Calibration Error' section header, but functionally relate to internal command operation limits. They are categorized here as 'operation_error_internal_command' for tooling clarity."
  - "Codes 3480 and 3481 genuinely share the same message 'Invalid frame configuration.' per the PDF; they are distinct firmware error codes."
  - "Recovery hints are engineering guidance for tooling, not official Keysight language."
